name: Publish to GitHub Packages

on:
  push:
    branches: ['main']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Login to GitHub Docker Repo
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u lavylavenderr --password-stdin

      - name: Build Docker Image
        run: docker build -t temporaryweb .

      - name: Tag Docker Image
        run: docker tag temporaryweb ghcr.io/lavylavenderr/temporaryweb:latest

      - name: Push Docker Image
        run: docker push ghcr.io/lavylavenderr/temporaryweb:latest
